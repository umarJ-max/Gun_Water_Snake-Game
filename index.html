<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gun · Water · Snake — a Rock Paper Scissors variant. Pick your move, beat the computer." />
  <title>Gun · Water · Snake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>🐍</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-logo">G·W·S</div>
    <div class="nav-hint">W · G · S keys work too</div>
  </nav>

  <main class="main">

    <!-- Score strip -->
    <div class="score-strip">
      <div class="score-cell">
        <span class="score-n" id="playerScore">0</span>
        <span class="score-l">You</span>
      </div>
      <div class="score-sep">:</div>
      <div class="score-cell">
        <span class="score-n" id="drawScore">0</span>
        <span class="score-l">Draw</span>
      </div>
      <div class="score-sep">:</div>
      <div class="score-cell">
        <span class="score-n" id="computerScore">0</span>
        <span class="score-l">CPU</span>
      </div>
      <button class="btn-reset" id="resetBtn" title="Reset scores">↺</button>
    </div>

    <!-- Rules card (shown before first move) -->
    <div class="rules-card" id="rulesCard">
      <p class="rules-title">How it works</p>
      <div class="rules-grid">
        <div class="rule-item">
          <span class="rule-emoji">💧</span>
          <span class="rule-text">Water <em>rusts</em> Gun</span>
        </div>
        <div class="rule-item">
          <span class="rule-emoji">🔫</span>
          <span class="rule-text">Gun <em>shoots</em> Snake</span>
        </div>
        <div class="rule-item">
          <span class="rule-emoji">🐍</span>
          <span class="rule-text">Snake <em>drinks</em> Water</span>
        </div>
      </div>
    </div>

    <!-- Pick buttons -->
    <div class="picks" id="picksArea">
      <button class="pick-btn" data-choice="water">
        <span class="pick-emoji">💧</span>
        <span class="pick-label">Water</span>
        <span class="pick-key">W</span>
      </button>
      <button class="pick-btn" data-choice="gun">
        <span class="pick-emoji">🔫</span>
        <span class="pick-label">Gun</span>
        <span class="pick-key">G</span>
      </button>
      <button class="pick-btn" data-choice="snake">
        <span class="pick-emoji">🐍</span>
        <span class="pick-label">Snake</span>
        <span class="pick-key">S</span>
      </button>
    </div>

    <!-- Result area -->
    <div class="result-area hidden" id="resultArea">
      <div class="versus-row">
        <div class="versus-side">
          <span class="versus-emoji" id="playerEmoji"></span>
          <span class="versus-name" id="playerName"></span>
          <span class="versus-who">You</span>
        </div>
        <div class="versus-mid">
          <span class="vs-badge">VS</span>
        </div>
        <div class="versus-side">
          <span class="versus-emoji" id="cpuEmoji"></span>
          <span class="versus-name" id="cpuName"></span>
          <span class="versus-who">CPU</span>
        </div>
      </div>

      <div class="outcome-band" id="outcomeBand">
        <span class="outcome-text" id="outcomeText"></span>
        <span class="outcome-explain" id="outcomeExplain"></span>
      </div>

      <button class="btn-again" id="playAgainBtn">Play again →</button>
    </div>

  </main>

  <footer class="footer">
    Made with <span class="heart">♥</span> by <a href="https://github.com/umarJ-max" target="_blank">Umar J</a>
    &nbsp;·&nbsp; Space or Enter to play again
  </footer>

  <script src="script.js"></script>
</body>
</html>
